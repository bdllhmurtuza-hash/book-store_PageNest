<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="cart-page">

<header>
  <h1>🧾 Order Summary</h1>
  <a href="{{ url_for('home') }}" class="btn-primary">← Continue Shopping</a>
</header>

<section id="cartItems"></section>

<h2 id="cartTotal">Total: ₹0</h2>

<button class="checkout-btn" onclick="showPaymentOptions()">Proceed to Purchase</button>

<!-- Payment Modal -->
<div id="paymentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
  <div style="background:white; padding:20px; margin:100px auto; width:300px; text-align:center;">
    <h3>Select Payment Method</h3>
    <button onclick="completePurchase('Cash')">Pay with Cash</button>
    <button onclick="completePurchase('Card')">Card Payment</button>
    <button onclick="completePurchase('UPI')">Pay with UPI</button>
    <br><br>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
